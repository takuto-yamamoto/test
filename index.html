<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たこ先生の8本足会議</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Yomogi&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root{
    --paper: #F7F1E2;
    --ink: #1C1A17;
    --coral: #F2574E;
    --coral-deep: #D8392F;
    --coral-soft: #FFD9D2;
    --bamboo: #C9985F;
    --bamboo-deep: #8C6A3F;
    --shadow: rgba(50, 30, 10, 0.18);
    --line: rgba(28,26,23,0.14);
  }

  *{ box-sizing: border-box; }
  body{
    margin:0; padding:20px;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .stage{ max-width: 600px; margin: 0 auto; }
  
  /* 吹き出しのスタイル */
  .octopus-bubble {
    background: #fff;
    padding: 16px 20px;
    border: 2px solid var(--ink);
    border-radius: 20px;
    border-top-left-radius: 0;
    margin-bottom: 16px;
    box-shadow: 4px 4px 0 var(--shadow);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .octopus-bubble.show { opacity: 1; transform: translateY(0); }
  
  .octopus-bubble-title {
    font-weight: 700;
    color: var(--coral-deep);
    margin-bottom: 6px;
    font-size: 15px;
  }
  .octopus-bubble-body { font-size: 14.5px; line-height: 1.6; }

  #next-ideas-btn {
    display: block;
    margin: 20px auto;
    padding: 12px 24px;
    background: var(--coral);
    color: #fff;
    border: 2px solid var(--ink);
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
  }
  .hidden { display: none !important; }
  
  /* 既存のCSS（必要に応じて追加してください） */
</style>
</head>
<body>

<div class="stage">
  <div id="results-zone"></div>
  <button id="next-ideas-btn" class="hidden">次の4本を聞く 🐙</button>
</div>

<script>
  let currentIdeas = [];
  let currentIdeaPage = 0;

  // --- メインの表示処理 ---
  function renderResults(problem, payload) {
    // payloadから配列を取得（データ構造に応じて調整）
    currentIdeas = Array.isArray(payload.ideas) ? payload.ideas : (payload || []);
    currentIdeaPage = 0;
    
    const container = document.getElementById('results-zone');
    container.innerHTML = ''; 
    
    displayIdeaPage(currentIdeaPage);
  }

  // --- ページ表示処理 ---
  function displayIdeaPage(page) {
    const container = document.getElementById('results-zone');
    const nextBtn = document.getElementById('next-ideas-btn');
    
    // 現在のページ分だけを表示
    const startIndex = page * 4;
    const pageItems = currentIdeas.slice(startIndex, startIndex + 4);

    pageItems.forEach((idea, index) => {
      setTimeout(() => {
        const bubble = document.createElement('div');
        bubble.className = 'octopus-bubble';
        
        // オブジェクトか文字列かを判定して表示
        let content = "";
        if (typeof idea === 'object' && idea !== null) {
          const title = idea.title ? `<div class="octopus-bubble-title">💡 ${idea.title}</div>` : '';
          const body = idea.text || idea.description || idea;
          content = `${title}<div class="octopus-bubble-body">${body}</div>`;
        } else {
          content = `<div class="octopus-bubble-body">${idea}</div>`;
        }
        
        bubble.innerHTML = content;
        container.appendChild(bubble);

        requestAnimationFrame(() => bubble.classList.add('show'));
        bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });

        // 最後の要素まで表示し終わったら、次へボタンを判定
        if (page === 0 && index === pageItems.length - 1 && currentIdeas.length > 4) {
          setTimeout(() => {
            nextBtn.classList.remove('hidden');
            nextBtn.scrollIntoView({ behavior: 'smooth', block: 'end' });
          }, 500);
        }
      }, index * 800);
    });
  }

  // --- 次へボタンのイベント ---
  document.getElementById('next-ideas-btn').addEventListener('click', () => {
    currentIdeaPage = 1;
    document.getElementById('next-ideas-btn').classList.add('hidden');
    displayIdeaPage(currentIdeaPage);
  });

  // --- JSONパースの補助（既存のものと差し替えてください） ---
  function safeParseJSON(text) {
    try {
      // マークダウンのブロック記法を除去
      const cleaned = text.replace(/```json/g, '').replace(/```/g, '');
      return JSON.parse(cleaned);
    } catch (e) {
      console.error("JSON解析エラー:", e);
      return null;
    }
  }
</script>
</body>
</html>
